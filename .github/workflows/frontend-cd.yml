name: Frontend Production Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  repository_dispatch:
    types: [api-contract-update] # Triggers optionally when the backend notifies the frontend!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Lint and Test UI components
        run: npm run test --if-present

      - name: Build Optimized Bundle
        run: npm run build

      - name: Deploy to Production (CDN / Vercel / CloudFront)
        run: |
          echo "Deploying the fully tested frontend code utilizing the incredibly stable Backend API endpoints!"
          echo "Production URL is LIVE!"
